<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VPS Latency Probe</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090b0f;
        --panel: rgba(18, 22, 28, 0.82);
        --panel-strong: rgba(24, 29, 36, 0.96);
        --surface: rgba(15, 19, 24, 0.88);
        --surface-soft: rgba(255, 255, 255, 0.055);
        --surface-faint: rgba(255, 255, 255, 0.028);
        --line: rgba(255, 255, 255, 0.12);
        --line-strong: rgba(255, 255, 255, 0.18);
        --text: #eef2f0;
        --muted: #93a0a3;
        --green: #40d98a;
        --amber: #f5b944;
        --cyan: #40c7d8;
        --rose: #ff5c7a;
        --ink: #0f1418;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.026) 1px, transparent 1px),
          linear-gradient(135deg, #080b0f 0%, #0d1412 46%, #151117 100%);
        background-size: 42px 42px, 42px 42px, auto;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0.018) 0,
          rgba(255,255,255,0.018) 1px,
          transparent 1px,
          transparent 7px
        );
        mix-blend-mode: screen;
        opacity: 0.22;
      }

      .shell {
        width: min(1500px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 0 20px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
        font-weight: 760;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .clock {
        min-width: 210px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255,255,255,0.045);
        text-align: right;
      }

      .clock strong {
        display: block;
        font-size: 18px;
      }

      .clock span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .metric,
      .node-card,
      .target-row {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.012)),
          var(--surface);
        box-shadow: 0 14px 38px rgba(0,0,0,0.24);
        backdrop-filter: blur(18px);
      }

      .metric {
        min-height: 102px;
        padding: 16px 16px 14px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .metric::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 3px;
        background: linear-gradient(180deg, var(--green), rgba(64, 199, 216, 0.52));
        opacity: 0.85;
      }

      .metric .label {
        color: var(--muted);
        font-size: 12px;
      }

      .metric .value {
        font-size: 30px;
        font-weight: 780;
        line-height: 1;
      }

      .metric .hint {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .panel {
        min-width: 0;
        padding: 4px 0 0;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .panel-title {
        margin: 0;
        font-size: 16px;
        font-weight: 720;
        letter-spacing: 0;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      select,
      button {
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255,255,255,0.08);
        color: var(--text);
        font: inherit;
        font-size: 13px;
      }

      select {
        min-width: 180px;
        padding: 0 10px;
        color-scheme: dark;
      }

      select option {
        background: #121820;
        color: #eef2f0;
      }

      select option:checked {
        background: #1f8f5e;
        color: #ffffff;
      }

      select option:disabled {
        color: #6f7a7d;
      }

      button {
        padding: 0 12px;
        cursor: pointer;
        transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease, transform 0.18s ease;
      }

      button:hover,
      select:hover {
        border-color: rgba(64, 217, 138, 0.55);
      }

      button:active {
        transform: translateY(1px);
      }

      .primary {
        color: #dfffee;
        background: rgba(64, 217, 138, 0.16);
      }

      .toggle.active {
        color: #dfffee;
        border-color: rgba(64, 217, 138, 0.72);
        background: rgba(64, 217, 138, 0.22);
      }

      .time-tabs {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-soft);
      }

      .time-tab {
        height: 28px;
        min-width: 52px;
        padding: 0 9px;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
      }

      .time-tab:hover,
      .time-tab.active {
        color: #dfffee;
        background: rgba(64, 217, 138, 0.18);
      }

      .combo {
        position: relative;
        min-width: 180px;
      }

      .combo-trigger {
        width: 100%;
        min-width: 180px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 12px;
        text-align: left;
      }

      .combo-trigger::after {
        content: "";
        width: 8px;
        height: 8px;
        border-right: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
        transform: rotate(45deg) translateY(-2px);
        opacity: 0.8;
      }

      .combo-menu {
        position: absolute;
        z-index: 30;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        display: none;
        overflow: hidden;
        border: 1px solid rgba(64, 217, 138, 0.45);
        border-radius: 6px;
        background: #10161d;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.62);
      }

      .combo.open .combo-menu {
        display: block;
      }

      .combo-item {
        width: 100%;
        height: 38px;
        border: 0;
        border-radius: 0;
        background: #10161d;
        color: #eef2f0;
        padding: 0 12px;
        text-align: left;
      }

      .combo-item:hover,
      .combo-item.active {
        background: #1d6f51;
        color: #ffffff;
      }

      .chart-wrap {
        position: relative;
        height: clamp(620px, 68vh, 780px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: var(--radius);
        background:
          linear-gradient(180deg, rgba(64, 217, 138, 0.055), transparent 38%),
          linear-gradient(180deg, rgba(255,255,255,0.032), rgba(255,255,255,0.008)),
          rgba(3,5,7,0.64);
        overflow: hidden;
      }

      .chart-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(90deg, rgba(64,217,138,0.045), transparent 18%, transparent 82%, rgba(64,199,216,0.04));
        z-index: 0;
      }

      .chart-legend {
        position: absolute;
        left: 74px;
        right: 18px;
        bottom: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 7px 14px;
        align-items: center;
        pointer-events: none;
        font-size: 11px;
        color: rgba(238, 242, 240, 0.78);
        z-index: 2;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 240px;
        min-width: 0;
        min-height: 20px;
        padding: 2px 7px;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 999px;
        background: rgba(6, 9, 12, 0.58);
        backdrop-filter: blur(10px);
      }

      .legend-swatch {
        width: 18px;
        height: 3px;
        flex: 0 0 auto;
        border-radius: 999px;
        box-shadow: 0 0 8px currentColor;
      }

      .legend-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #chart {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: block;
      }

      .scanline {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(180deg, transparent, rgba(64, 217, 138, 0.08), transparent);
        height: 120px;
        animation: scan 4.8s linear infinite;
        opacity: 0.5;
        z-index: 2;
      }

      @keyframes scan {
        from { transform: translateY(-130px); }
        to { transform: translateY(460px); }
      }

      .nodes {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 12px;
      }

      .node-card {
        padding: 14px 14px 13px 17px;
      }

      .node-card::before {
        content: "";
        position: absolute;
        inset: 12px auto 12px 0;
        width: 3px;
        border-radius: 999px;
        background: var(--node-color, var(--green));
        box-shadow: 0 0 18px var(--node-color, var(--green));
      }

      .node-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .node-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }

      .node-edit,
      .node-delete {
        height: 28px;
        padding: 0 9px;
        font-size: 12px;
      }

      .node-delete,
      .target-delete {
        color: #ffd0d8;
        background: rgba(255, 92, 122, 0.12);
      }

      .node-name {
        font-weight: 720;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--node-color, var(--green));
      }

      .badge {
        flex: 0 0 auto;
        min-width: 68px;
        text-align: center;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid rgba(255,255,255,0.14);
      }

      .badge.online {
        color: #bff8d8;
        background: rgba(64,217,138,0.12);
      }

      .badge.offline {
        color: #ffd0d8;
        background: rgba(255,92,122,0.12);
      }

      .node-meta {
        color: var(--muted);
        margin-top: 6px;
        font-size: 12px;
        line-height: 1.25;
      }

      .bar {
        height: 8px;
        background: rgba(255,255,255,0.08);
        border-radius: 999px;
        margin-top: 12px;
        overflow: hidden;
      }

      .bar span {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--green), var(--amber), var(--rose));
        border-radius: inherit;
        transition: width 0.35s ease;
      }

      .targets {
        display: grid;
        gap: 9px;
        margin-top: 12px;
      }

      .target-row {
        display: grid;
        grid-template-columns: minmax(150px, 1fr) 76px 92px 86px 230px;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
      }

      .target-row.selected {
        border-color: rgba(64, 217, 138, 0.42);
        background:
          linear-gradient(90deg, rgba(64,217,138,0.12), transparent 32%),
          linear-gradient(180deg, rgba(255,255,255,0.046), rgba(255,255,255,0.014)),
          var(--surface);
      }

      .target-row.selected::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 3px;
        background: var(--green);
      }

      .target-row span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .latency {
        font-variant-numeric: tabular-nums;
        font-weight: 720;
      }

      .target-action {
        height: 30px;
        padding: 0 10px;
        font-size: 12px;
      }

      .target-actions {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
        min-width: 0;
        flex-wrap: wrap;
      }

      .check-list {
        display: grid;
        gap: 7px;
      }

      .check-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 30px;
        padding: 6px 8px;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 6px;
        background: rgba(255,255,255,0.04);
        color: var(--text);
        font-size: 13px;
      }

      .check-row input {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
      }

      .check-row span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      input[readonly] {
        color: var(--muted);
      }

      .good { color: var(--green); }
      .warn { color: var(--amber); }
      .bad { color: var(--rose); }
      .muted { color: var(--muted); }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        z-index: 20;
        padding: 20px;
        background: rgba(0, 0, 0, 0.58);
        backdrop-filter: blur(12px);
      }

      .modal.open {
        display: grid;
      }

      .login-screen {
        position: fixed;
        inset: 0;
        z-index: 25;
        display: grid;
        place-items: center;
        padding: 20px;
        background:
          linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
          rgba(3, 5, 7, 0.86);
        background-size: 42px 42px, 42px 42px, auto;
        backdrop-filter: blur(14px);
      }

      .login-screen.hidden {
        display: none;
      }

      .dialog {
        width: min(520px, 100%);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel-strong);
        box-shadow: 0 28px 80px rgba(0,0,0,0.55);
        padding: 18px;
      }

      .dialog h3 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      .form-grid {
        display: grid;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--muted);
        font-size: 12px;
      }

      input {
        width: 100%;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255,255,255,0.08);
        color: var(--text);
        padding: 0 10px;
        font: inherit;
        font-size: 13px;
      }

      .dialog-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 16px;
      }

      .form-error {
        min-height: 18px;
        color: var(--rose);
        font-size: 12px;
      }

      .auth-row {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }

      .auth-status {
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 960px) {
        .shell {
          width: min(100% - 20px, 1400px);
          padding-top: 14px;
        }

        .topbar,
        .panel-header {
          flex-direction: column;
          align-items: stretch;
        }

        .clock {
          text-align: left;
          min-width: 0;
        }

        .metrics,
        .layout {
          grid-template-columns: 1fr;
        }

        .chart-wrap {
          height: 480px;
        }
      }

      @media (max-width: 560px) {
        h1 {
          font-size: 24px;
        }

        .metrics {
          grid-template-columns: 1fr 1fr;
        }

        .target-row {
          grid-template-columns: minmax(0, 1fr) 76px;
        }

        .target-row span:nth-child(2) {
          display: none;
        }

        .target-row span:nth-child(3) {
          display: none;
        }

        .target-actions {
          grid-column: 1 / -1;
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-screen hidden" id="loginScreen">
      <div class="dialog">
        <h3>Login</h3>
        <div class="form-grid">
          <div class="field">
            <label for="loginToken">Admin token</label>
            <input id="loginToken" type="password" autocomplete="current-password" />
          </div>
          <div class="form-error" id="loginError"></div>
          <div class="dialog-actions">
            <button class="primary" id="loginBtn" type="button">Login</button>
          </div>
        </div>
      </div>
    </div>

    <div class="shell">
      <header class="topbar">
        <div>
          <h1>VPS Latency Probe</h1>
          <p class="subtitle" id="subtitle">connecting</p>
        </div>
        <div>
          <div class="clock">
            <strong id="clock">--:--:--</strong>
            <span id="updated">waiting for samples</span>
          </div>
          <div class="auth-row">
            <span class="auth-status" id="authStatus">signed out</span>
            <button id="logoutBtn" type="button">Logout</button>
          </div>
        </div>
      </header>

      <section class="metrics">
        <div class="metric">
          <div class="label">Nodes</div>
          <div class="value" id="nodeCount">0</div>
          <div class="hint" id="nodeHint">online</div>
        </div>
        <div class="metric">
          <div class="label">Targets</div>
          <div class="value" id="targetCount">0</div>
          <div class="hint">active probes</div>
        </div>
        <div class="metric">
          <div class="label">Median</div>
          <div class="value" id="medianLatency">--</div>
          <div class="hint">visible probes</div>
        </div>
        <div class="metric">
          <div class="label">Worst</div>
          <div class="value" id="worstLatency">--</div>
          <div class="hint" id="worstNode">no data</div>
        </div>
      </section>

      <main class="layout">
        <aside class="panel">
          <div class="panel-header">
            <h2 class="panel-title">Probe Nodes</h2>
            <div class="toolbar">
              <button class="primary" id="addNodeBtn" type="button">Add VPS</button>
            </div>
          </div>
          <div class="nodes" id="nodes"></div>
        </aside>

        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">Targets</h2>
            <div class="toolbar">
              <button class="primary" id="addTargetBtn" type="button">Add Target</button>
              <button id="refreshBtn" type="button">Refresh</button>
            </div>
          </div>
          <div class="targets" id="targetRows"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">Latency Timeline</h2>
            <div class="toolbar">
              <div class="time-tabs" id="timeRangeTabs" role="tablist" aria-label="Timeline range"></div>
              <div class="combo" id="targetCombo">
                <button class="combo-trigger" id="targetSelectButton" type="button" aria-haspopup="listbox" aria-expanded="false">Target</button>
                <div class="combo-menu" id="targetMenu" role="listbox"></div>
              </div>
              <button class="toggle" id="peakToggleBtn" type="button" aria-pressed="false">Peak</button>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="chart"></canvas>
            <div class="scanline"></div>
            <div class="chart-legend" id="chartLegend"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="dialog">
        <h3 id="modalTitle"></h3>
        <form id="modalForm" class="form-grid"></form>
        <div class="form-error" id="modalError"></div>
        <div class="dialog-actions">
          <button id="cancelModal" type="button">Cancel</button>
          <button class="primary" id="saveModal" type="button">Save</button>
        </div>
      </div>
    </div>

    <script>
      const ALL_TARGETS = "__all__";
      const HOUR_MS = 60 * 60 * 1000;
      const TIMELINE_WINDOWS = [4, 8, 12, 24];
      const colors = ["#40d98a", "#40c7d8", "#f5b944", "#ff5c7a", "#c9f24a", "#e68cff", "#8eb7ff", "#ff9f43"];
      localStorage.removeItem("probeSelectedTarget");
      const state = {
        data: null,
        selectedTarget: ALL_TARGETS,
        timelineHours: 24,
        trimPeaks: false,
        savingSelectedTarget: false,
        selectedTargetVersion: 0,
        selectedTargetSaveId: 0,
        modalMode: "",
        editTarget: null,
        editNode: null,
        adminEnabled: true,
        authenticated: false,
      };
      const $ = (id) => document.getElementById(id);

      function fmtLatency(value) {
        if (value === null || value === undefined || Number.isNaN(value)) return "--";
        return `${Math.round(value)}ms`;
      }

      function fmtRate(value) {
        if (value === null || value === undefined || Number.isNaN(value)) return "--";
        const units = ["B/s", "KB/s", "MB/s", "GB/s", "TB/s"];
        let amount = Math.max(0, Number(value));
        let unitIndex = 0;
        while (amount >= 1024 && unitIndex < units.length - 1) {
          amount /= 1024;
          unitIndex += 1;
        }
        const digits = amount >= 100 || unitIndex === 0 ? 0 : amount >= 10 ? 1 : 2;
        return `${amount.toFixed(digits)} ${units[unitIndex]}`;
      }

      function fmtBytes(value) {
        if (value === null || value === undefined || Number.isNaN(value)) return "--";
        const units = ["B", "KB", "MB", "GB", "TB", "PB"];
        let amount = Math.max(0, Number(value));
        let unitIndex = 0;
        while (amount >= 1024 && unitIndex < units.length - 1) {
          amount /= 1024;
          unitIndex += 1;
        }
        const digits = amount >= 100 || unitIndex === 0 ? 0 : amount >= 10 ? 1 : 2;
        return `${amount.toFixed(digits)} ${units[unitIndex]}`;
      }

      function latencyClass(value) {
        if (value === null || value === undefined) return "muted";
        if (value < 80) return "good";
        if (value < 180) return "warn";
        return "bad";
      }

      function setClock() {
        const now = new Date();
        $("clock").textContent = now.toLocaleTimeString();
      }

      function storedToken() {
        return localStorage.getItem("probeAdminToken") || "";
      }

      function setStoredToken(token) {
        if (token) localStorage.setItem("probeAdminToken", token);
        else localStorage.removeItem("probeAdminToken");
      }

      function setAuthUi(authenticated) {
        state.authenticated = authenticated || !state.adminEnabled;
        $("loginScreen").classList.toggle("hidden", state.authenticated);
        $("authStatus").textContent = state.authenticated ? "signed in" : "signed out";
      }

      function showLogin(message = "") {
        $("loginError").textContent = message;
        setAuthUi(false);
        setTimeout(() => $("loginToken").focus(), 0);
      }

      async function verifyToken(token) {
        const response = await fetch("/api/auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ admin_token: token }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) throw new Error(data.error || "Login failed");
      }

      async function login() {
        const token = $("loginToken").value.trim();
        if (!token) {
          $("loginError").textContent = "Admin token is required";
          return;
        }
        try {
          await verifyToken(token);
          setStoredToken(token);
          $("loginToken").value = "";
          $("loginError").textContent = "";
          setAuthUi(true);
        } catch (error) {
          setStoredToken("");
          $("loginError").textContent = error.message || "Login failed";
        }
      }

      function logout() {
        setStoredToken("");
        showLogin("");
      }

      async function initAuth() {
        try {
          const response = await fetch("/api/config", { cache: "no-store" });
          const config = await response.json();
          state.adminEnabled = config.admin_enabled !== false;
        } catch {
          state.adminEnabled = true;
        }
        if (!state.adminEnabled) {
          setAuthUi(true);
          return;
        }
        const token = storedToken();
        if (!token) {
          showLogin("");
          return;
        }
        try {
          await verifyToken(token);
          setAuthUi(true);
        } catch {
          setStoredToken("");
          showLogin("Admin token expired or invalid");
        }
      }

      function requireAdmin() {
        if (state.authenticated || !state.adminEnabled) return true;
        showLogin("");
        return false;
      }

      function latestFor(node, targetId) {
        const result = node.results?.[targetId];
        if (!result) return null;
        return result.latency_ms ?? null;
      }

      function seriesFor(node, targetId) {
        return node.results?.[targetId]?.series || [];
      }

      function lineColor(index) {
        return colors[index % colors.length];
      }

      function chartLineAlpha(index, total) {
        if (total <= 3) return 0.96;
        if (total <= 6) return index < 2 ? 0.9 : 0.74;
        return index < 3 ? 0.86 : 0.58;
      }

      function visibleTargets(targets) {
        if (state.selectedTarget === ALL_TARGETS) return targets;
        return targets.filter((target) => target.id === state.selectedTarget);
      }

      function visibleSeries(data) {
        const targets = visibleTargets(data.targets || []);
        return targets.flatMap((target) =>
          (data.nodes || []).map((nodeWrap) => ({
            nodeWrap,
            target,
            label: `${nodeWrap.node?.name || nodeWrap.node?.id || "Node"} · ${target.name}`,
            points: seriesFor(nodeWrap, target.id).filter((point) => point.latency_ms !== null),
          }))
        ).filter((item) => item.points.length);
      }

      function latestVisibleLatencies(data) {
        const targets = visibleTargets(data.targets || []);
        return (data.nodes || []).flatMap((nodeWrap) =>
          targets.map((target) => ({
            nodeWrap,
            target,
            latency: latestFor(nodeWrap, target.id),
          }))
        ).filter((item) => item.latency !== null);
      }

      function dayRange(timestamp) {
        const start = new Date(timestamp || Date.now());
        start.setHours(0, 0, 0, 0);
        return { start: start.getTime(), end: start.getTime() + 24 * HOUR_MS };
      }

      function timelineWindow() {
        const end = Date.now();
        const hours = TIMELINE_WINDOWS.includes(state.timelineHours) ? state.timelineHours : 24;
        return {
          start: end - hours * HOUR_MS,
          end,
          day: dayRange(end),
          hours,
        };
      }

      function chartRange(points, windowRange) {
        if (!points.length) return windowRange;
        const minT = Math.max(windowRange.start, Math.min(...points.map((point) => point.t)));
        const maxT = Math.min(windowRange.end, Math.max(...points.map((point) => point.t)));
        const span = Math.max(1, maxT - minT);
        const padding = Math.max(15 * 60 * 1000, span * 0.12);
        return {
          ...windowRange,
          start: Math.max(windowRange.start, minT - padding),
          end: Math.min(windowRange.end, maxT + padding),
        };
      }

      function timelineTickStep(hours) {
        if (hours <= 4) return HOUR_MS;
        if (hours <= 8) return 2 * HOUR_MS;
        return 4 * HOUR_MS;
      }

      function timelineTicks(range) {
        const step = timelineTickStep(range.hours || 24);
        const first = Math.ceil(range.start / step) * step;
        const ticks = [];
        for (let tick = first; tick <= range.end; tick += step) {
          ticks.push(tick);
        }
        return ticks;
      }

      function timeTickLabel(timestamp, range) {
        const date = new Date(timestamp);
        if ((range.hours || 24) >= 12 && date.getMinutes() === 0) {
          return `${date.getHours()}\u70b9`;
        }
        return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function drawTimeLabels(ctx, range, pad, w, h, rectWidth) {
        const labelPadding = 10;
        const axisY = pad.top + h + 30;
        const xForTime = (timestamp) => pad.left + ((timestamp - range.start) / (range.end - range.start)) * w;
        const boundaryOptions = { hour: "2-digit", minute: "2-digit" };
        const labels = [
          {
            timestamp: range.start,
            text: new Date(range.start).toLocaleTimeString([], boundaryOptions),
            priority: 2,
            align: "start",
          },
          {
            timestamp: range.end,
            text: new Date(range.end).toLocaleTimeString([], boundaryOptions),
            priority: 2,
            align: "end",
          },
          ...timelineTicks(range).map((timestamp) => ({
            timestamp,
            text: timeTickLabel(timestamp, range),
            priority: 1,
            align: "center",
          })),
        ];
        const placed = [];
        ctx.fillStyle = "rgba(147,160,163,0.9)";
        labels
          .sort((a, b) => b.priority - a.priority || a.timestamp - b.timestamp)
          .forEach((label) => {
            const width = ctx.measureText(label.text).width;
            const centerX = xForTime(label.timestamp);
            let left = centerX - width / 2;
            if (label.align === "start") left = pad.left;
            if (label.align === "end") left = pad.left + w - width;
            left = Math.max(6, Math.min(rectWidth - width - 6, left));
            const right = left + width;
            if (placed.some((item) => left < item.right + labelPadding && right > item.left - labelPadding)) return;
            placed.push({ left, right });
            ctx.fillText(label.text, left, axisY);
          });
      }

      function bucketPoints(points, range, width) {
        const bucketCount = Math.max(1, Math.floor(width * 1.5));
        const bucketSpan = (range.end - range.start) / bucketCount;
        const buckets = new Map();
        points.forEach((point) => {
          if (point.latency_ms === null || point.latency_ms === undefined) return;
          const rawIndex = Math.floor((point.t - range.start) / bucketSpan);
          const index = Math.max(0, Math.min(bucketCount - 1, rawIndex));
          const bucket = buckets.get(index) || { t: 0, latency_ms: 0, count: 0 };
          bucket.t += point.t;
          bucket.latency_ms += point.latency_ms;
          bucket.count += 1;
          buckets.set(index, bucket);
        });
        return [...buckets.entries()]
          .sort((a, b) => a[0] - b[0])
          .map(([, bucket]) => ({
            t: bucket.t / bucket.count,
            latency_ms: bucket.latency_ms / bucket.count,
          }));
      }

      function connectPointGaps(points, range, width) {
        if (points.length < 2) return points;
        const maxGap = Math.max(90 * 1000, (range.end - range.start) / Math.max(1, width) * 8);
        return points.map((point, index) => ({
          ...point,
          gapBefore: index > 0 && point.t - points[index - 1].t > maxGap,
        }));
      }

      function quantile(sortedValues, q) {
        if (!sortedValues.length) return 0;
        const index = (sortedValues.length - 1) * q;
        const low = Math.floor(index);
        const high = Math.ceil(index);
        if (low === high) return sortedValues[low];
        return sortedValues[low] + (sortedValues[high] - sortedValues[low]) * (index - low);
      }

      function trimPeakPoints(points) {
        if (!state.trimPeaks || points.length < 5) return points;
        const values = points
          .map((point) => point.latency_ms)
          .filter((value) => Number.isFinite(value))
          .sort((a, b) => a - b);
        if (values.length < 5) return points;
        const q1 = quantile(values, 0.25);
        const median = quantile(values, 0.5);
        const q3 = quantile(values, 0.75);
        const p90 = quantile(values, 0.9);
        const spread = Math.max(q3 - q1, p90 - median, 1);
        const cutoff = Math.max(q3 + spread * 3, median + Math.max(20, median * 0.35));
        const trimmed = points.filter((point) => point.latency_ms <= cutoff);
        return trimmed.length >= Math.max(2, Math.floor(points.length * 0.25)) ? trimmed : points;
      }

      function nodeHasTarget(nodeWrap, targetId) {
        return (nodeWrap.targets || []).some((target) => target.id === targetId);
      }

      function assignedNodeIds(targetId) {
        return (state.data?.nodes || [])
          .filter((nodeWrap) => nodeHasTarget(nodeWrap, targetId))
          .map((nodeWrap) => nodeWrap.node?.id)
          .filter(Boolean);
      }

      function nodeCheckboxes(selectedIds) {
        const selected = new Set(selectedIds);
        const nodes = state.data?.nodes || [];
        if (!nodes.length) return `<div class="muted">No VPS nodes</div>`;
        return `
          <div class="field">
            <label>Probe Nodes</label>
            <div class="check-list">
              ${nodes.map((nodeWrap) => {
                const node = nodeWrap.node || {};
                const id = node.id || "";
                return `
                  <label class="check-row">
                    <input type="checkbox" name="nodeIds" value="${id}" ${selected.has(id) ? "checked" : ""} />
                    <span>${node.name || id}</span>
                  </label>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }

      function checkedNodeIds() {
        return [...$("modalForm").querySelectorAll('input[name="nodeIds"]:checked')]
          .map((input) => input.value)
          .filter(Boolean);
      }

      function sampleFromResult(result) {
        if (!result || result.t === undefined) return null;
        return {
          t: result.t,
          latency_ms: result.latency_ms ?? null,
          ok: Boolean(result.ok),
          error: result.error || "",
        };
      }

      function mergeLiveSnapshot(liveData) {
        if (!state.data) {
          state.data = liveData;
          return;
        }
        const existingNodes = new Map(
          (state.data.nodes || []).map((nodeWrap) => [nodeWrap.node?.id, nodeWrap])
        );
        const cutoff = (liveData.generated_at || Date.now()) - 24 * 60 * 60 * 1000;
        const nodes = (liveData.nodes || []).map((liveWrap) => {
          const nodeId = liveWrap.node?.id;
          const existing = existingNodes.get(nodeId) || {};
          const mergedResults = { ...(existing.results || {}) };
          Object.entries(liveWrap.results || {}).forEach(([targetId, result]) => {
            const previous = mergedResults[targetId] || {};
            const series = [...(previous.series || [])].filter((point) => point.t >= cutoff);
            const sample = sampleFromResult(result);
            if (sample && !series.some((point) => point.t === sample.t)) {
              series.push(sample);
            }
            mergedResults[targetId] = { ...previous, ...result, series };
          });
          return { ...existing, ...liveWrap, results: mergedResults };
        });
        state.data = { ...state.data, ...liveData, nodes };
      }

      function updateTargetSelect(targets) {
        const current = state.selectedTarget;
        const button = $("targetSelectButton");
        const menu = $("targetMenu");
        state.selectedTarget = current === ALL_TARGETS || targets.some((t) => t.id === current)
          ? current
          : ALL_TARGETS;
        const selected = targets.find((t) => t.id === state.selectedTarget);
        button.textContent = state.selectedTarget === ALL_TARGETS ? "All targets" : selected?.name || "Target";
        const items = [{ id: ALL_TARGETS, name: "All targets" }, ...targets];
        menu.innerHTML = items.map((target) => `
          <button class="combo-item ${target.id === state.selectedTarget ? "active" : ""}" type="button" data-target-id="${target.id}" role="option" aria-selected="${target.id === state.selectedTarget}">
            ${target.name}
          </button>
        `).join("");
        menu.querySelectorAll(".combo-item").forEach((item) => {
          item.addEventListener("click", () => {
            saveSelectedTarget(item.dataset.targetId);
            $("targetCombo").classList.remove("open");
            $("targetSelectButton").setAttribute("aria-expanded", "false");
          });
        });
      }

      function updatePeakButton() {
        const button = $("peakToggleBtn");
        button.classList.toggle("active", state.trimPeaks);
        button.setAttribute("aria-pressed", String(state.trimPeaks));
      }

      function updateTimeRangeTabs() {
        const tabs = $("timeRangeTabs");
        tabs.innerHTML = TIMELINE_WINDOWS.map((hours) => {
          const active = hours === state.timelineHours;
          return `
            <button class="time-tab ${active ? "active" : ""}" type="button" data-time-range="${hours}" role="tab" aria-selected="${active}">
              ${hours}\u5c0f\u65f6
            </button>
          `;
        }).join("");
        tabs.querySelectorAll("[data-time-range]").forEach((button) => {
          button.addEventListener("click", () => setTimelineHours(Number(button.dataset.timeRange)));
        });
      }

      function setTimelineHours(hours) {
        if (!TIMELINE_WINDOWS.includes(hours) || state.timelineHours === hours) return;
        state.timelineHours = hours;
        updateTimeRangeTabs();
        drawChart();
      }

      async function saveSelectedTarget(targetId) {
        const previous = state.selectedTarget;
        const requestedTarget = targetId || ALL_TARGETS;
        const token = adminToken();
        if (!token && state.adminEnabled) return;
        const saveId = state.selectedTargetSaveId + 1;
        state.selectedTargetSaveId = saveId;
        state.selectedTargetVersion += 1;

        state.selectedTarget = requestedTarget;
        state.savingSelectedTarget = true;
        updateTargetSelect(state.data?.targets || []);
        render();

        try {
          const response = await fetch("/api/preferences", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              admin_token: token,
              selected_target: requestedTarget,
            }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || !data.ok) throw new Error(data.error || "Save failed");
          if (saveId !== state.selectedTargetSaveId) return;
          state.selectedTarget = data.selected_target || state.selectedTarget;
        } catch (error) {
          if (saveId !== state.selectedTargetSaveId) return;
          state.selectedTarget = previous;
          if (error.message === "invalid admin token") {
            setStoredToken("");
            showLogin("Admin token expired or invalid");
          } else {
            console.error(error);
          }
        } finally {
          if (saveId === state.selectedTargetSaveId) {
            state.savingSelectedTarget = false;
            updateTargetSelect(state.data?.targets || []);
            render();
          }
        }
      }

      function drawChart() {
        const canvas = $("chart");
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, rect.width, rect.height);

        const data = state.data;
        if (!data) return;
        const pad = { left: 70, right: 28, top: 26, bottom: 86 };
        const w = rect.width - pad.left - pad.right;
        const h = rect.height - pad.top - pad.bottom;
        const timeWindow = timelineWindow();
        const rawLines = visibleSeries(data)
          .map((line) => ({
            ...line,
            points: trimPeakPoints(line.points.filter((point) => point.t >= timeWindow.start && point.t <= timeWindow.end)),
          }))
          .filter((line) => line.points.length);
        const rawPoints = rawLines.flatMap((line) => line.points);
        const range = chartRange(rawPoints, timeWindow);
        const lines = rawLines
          .map((line) => ({
            ...line,
            points: connectPointGaps(
              bucketPoints(
                line.points.filter((point) => point.t >= range.start && point.t <= range.end),
                range,
                w,
              ),
              range,
              w,
            ),
          }))
          .filter((line) => line.points.length);
        const all = lines.flatMap((line) => line.points);
        $("chartLegend").innerHTML = lines.map((line, index) => `
          <span class="legend-item">
            <span class="legend-swatch" style="color:${lineColor(index)}; background:${lineColor(index)}"></span>
            <span class="legend-label">${line.label}</span>
          </span>
        `).join("");
        if (!all.length) {
          ctx.fillStyle = "rgba(238,242,240,0.62)";
          ctx.font = "14px sans-serif";
          ctx.fillText("waiting for samples", pad.left, pad.top + 28);
          return;
        }
        const latencyValues = all.map((point) => point.latency_ms || 0);
        const minLatency = Math.min(...latencyValues);
        const maxObserved = Math.max(...latencyValues);
        const yMin = Math.max(0, minLatency - Math.max(5, (maxObserved - minLatency) * 0.18));
        const yMax = Math.max(yMin + 10, maxObserved + Math.max(5, (maxObserved - minLatency) * 0.18));

        ctx.lineWidth = 1;
        ctx.font = "12px sans-serif";
        ctx.fillStyle = "rgba(147,160,163,0.9)";
        for (let i = 0; i <= 5; i += 1) {
          const y = pad.top + (h / 5) * i;
          const value = Math.round(yMax - ((yMax - yMin) / 5) * i);
          ctx.strokeStyle = "rgba(255,255,255,0.1)";
          ctx.beginPath();
          ctx.moveTo(pad.left, y);
          ctx.lineTo(pad.left + w, y);
          ctx.stroke();
          ctx.fillText(`${value}ms`, 10, y + 4);
        }
        ctx.strokeStyle = "rgba(255,255,255,0.16)";
        ctx.strokeRect(pad.left, pad.top, w, h);
        timelineTicks(range).forEach((tick) => {
          const x = pad.left + ((tick - range.start) / (range.end - range.start)) * w;
          const date = new Date(tick);
          ctx.strokeStyle = date.getHours() % 8 === 0
            ? "rgba(255,255,255,0.13)"
            : "rgba(255,255,255,0.07)";
          ctx.beginPath();
          ctx.moveTo(x, pad.top);
          ctx.lineTo(x, pad.top + h);
          ctx.stroke();
        });
        drawTimeLabels(ctx, range, pad, w, h, rect.width);

        const xFor = (t) => pad.left + ((t - range.start) / (range.end - range.start)) * w;
        const yFor = (v) => pad.top + h - ((Math.min(yMax, Math.max(yMin, v || 0)) - yMin) / (yMax - yMin)) * h;

        lines.forEach((line, index) => {
          const points = line.points;
          if (!points.length) return;
          const color = lineColor(index);
          const alpha = chartLineAlpha(index, lines.length);
          ctx.strokeStyle = color;
          ctx.lineWidth = 2.5;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.globalAlpha = chartLineAlpha(index, lines.length);
          ctx.shadowColor = color;
          ctx.shadowBlur = lines.length > 5 ? 5 : 9;
          ctx.beginPath();
          points.forEach((point, pointIndex) => {
            const x = xFor(point.t);
            const y = yFor(point.latency_ms);
            if (pointIndex === 0 || point.gapBefore) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          });
          ctx.stroke();
          ctx.shadowBlur = 0;

          const last = points[points.length - 1];
          ctx.fillStyle = color;
          const pointStep = Math.max(1, Math.ceil(points.length / 420));
          points.forEach((point, pointIndex) => {
            if (pointIndex % pointStep !== 0 && point !== last) return;
            ctx.beginPath();
            ctx.arc(xFor(point.t), yFor(point.latency_ms), lines.length > 5 ? 1.8 : 2.4, 0, Math.PI * 2);
            ctx.fill();
          });
          ctx.globalAlpha = Math.min(1, alpha + 0.12);
          ctx.beginPath();
          ctx.arc(xFor(last.t), yFor(last.latency_ms), 4.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        });
      }

      function render() {
        const data = state.data;
        if (!data) return;
        const targets = data.targets || [];
        const nodes = data.nodes || [];
        const online = nodes.filter((n) => n.node?.status === "online").length;

        $("subtitle").textContent = `${online}/${nodes.length} nodes online`;
        $("updated").textContent = `updated ${new Date(data.generated_at).toLocaleTimeString()}`;
        $("nodeCount").textContent = nodes.length;
        $("nodeHint").textContent = `${online} online`;
        $("targetCount").textContent = targets.length;

        const visibleLatencies = latestVisibleLatencies(data);
        const latencies = visibleLatencies.map((item) => item.latency);
        latencies.sort((a, b) => a - b);
        const median = latencies.length ? latencies[Math.floor(latencies.length / 2)] : null;
        const worst = latencies.length ? Math.max(...latencies) : null;
        const worstItem = visibleLatencies.find((item) => item.latency === worst);
        $("medianLatency").textContent = fmtLatency(median);
        $("worstLatency").textContent = fmtLatency(worst);
        $("worstNode").textContent = worstItem
          ? `${worstItem.nodeWrap.node?.name || "Node"} · ${worstItem.target.name}`
          : "no data";

        $("nodes").innerHTML = nodes.map((nodeWrap, index) => {
          const node = nodeWrap.node || {};
          const network = node.network || {};
          const nodeValues = visibleTargets(targets).map((target) => latestFor(nodeWrap, target.id)).filter((value) => value !== null);
          const latency = nodeValues.length ? Math.max(...nodeValues) : null;
          const pct = latency === null ? 0 : Math.min(100, Math.round((latency / 260) * 100));
          const latencyLabel = state.selectedTarget === ALL_TARGETS
            ? `worst ${fmtLatency(latency)}`
            : fmtLatency(latency);
          return `
            <div class="node-card" style="--node-color:${lineColor(index)}">
              <div class="node-top">
                <div class="node-name">${node.name || node.id}</div>
                <div class="node-actions">
                  <button class="node-edit" type="button" data-edit-node="${node.id}">Edit</button>
                  ${index > 0 ? `<button class="node-delete" type="button" data-delete-node="${node.id}">Delete</button>` : ""}
                  <div class="badge ${node.status === "online" ? "online" : "offline"}">${node.status || "unknown"}</div>
                </div>
              </div>
              <div class="node-meta">${node.location || node.id || ""}</div>
              <div class="node-meta">down ${fmtRate(network.rx_bytes_per_sec)} / up ${fmtRate(network.tx_bytes_per_sec)}</div>
              <div class="node-meta">used down ${fmtBytes(network.rx_bytes)} / up ${fmtBytes(network.tx_bytes)}</div>
              <div class="node-meta ${latencyClass(latency)}">${latencyLabel}</div>
              <div class="bar"><span style="width:${pct}%"></span></div>
            </div>
          `;
        }).join("");
        document.querySelectorAll("[data-edit-node]").forEach((button) => {
          button.addEventListener("click", () => {
            if (!requireAdmin()) return;
            const nodeWrap = nodes.find((item) => item.node?.id === button.dataset.editNode);
            if (nodeWrap) openModal("editNode", nodeWrap);
          });
        });
        document.querySelectorAll("[data-delete-node]").forEach((button) => {
          button.addEventListener("click", () => {
            const nodeWrap = nodes.find((item) => item.node?.id === button.dataset.deleteNode);
            if (nodeWrap) deleteNode(nodeWrap);
          });
        });

        $("targetRows").innerHTML = targets.map((target) => {
          const values = nodes.map((node) => latestFor(node, target.id)).filter((v) => v !== null);
          const avg = values.length ? values.reduce((a, b) => a + b, 0) / values.length : null;
          const assignedCount = nodes.filter((node) => nodeHasTarget(node, target.id)).length;
          const selected = state.selectedTarget === target.id;
          return `
            <div class="target-row ${selected ? "selected" : ""}">
              <span>${target.name}</span>
              <span class="muted">${target.kind}</span>
              <span class="muted">${assignedCount}/${nodes.length} VPS</span>
              <span class="latency ${latencyClass(avg)}">${fmtLatency(avg)}</span>
              <div class="target-actions">
                <button class="target-action" type="button" data-edit-target="${target.id}">Edit</button>
                <button class="target-action" type="button" data-assign-target="${target.id}">Assign</button>
                <button class="target-action target-delete" type="button" data-delete-target="${target.id}">Delete</button>
              </div>
            </div>
          `;
        }).join("");
        document.querySelectorAll("[data-edit-target]").forEach((button) => {
          button.addEventListener("click", () => {
            if (!requireAdmin()) return;
            const target = targets.find((item) => item.id === button.dataset.editTarget);
            if (target) openModal("editTarget", target);
          });
        });
        document.querySelectorAll("[data-assign-target]").forEach((button) => {
          button.addEventListener("click", () => {
            if (!requireAdmin()) return;
            const target = targets.find((item) => item.id === button.dataset.assignTarget);
            if (target) openModal("assign", target);
          });
        });
        document.querySelectorAll("[data-delete-target]").forEach((button) => {
          button.addEventListener("click", () => {
            const target = targets.find((item) => item.id === button.dataset.deleteTarget);
            if (target) deleteTarget(target);
          });
        });

        drawChart();
      }

      async function loadSnapshot(options = {}) {
        const includeHistory = options.history !== false;
        const selectedTargetVersion = state.selectedTargetVersion;
        const path = includeHistory ? "/api/snapshot" : "/api/snapshot?history=0";
        const response = await fetch(path, { cache: "no-store" });
        const snapshot = await response.json();
        if (includeHistory) {
          state.data = snapshot;
        } else {
          mergeLiveSnapshot(snapshot);
        }
        if (!state.savingSelectedTarget && selectedTargetVersion === state.selectedTargetVersion) {
          state.selectedTarget = state.data.selected_target || ALL_TARGETS;
        }
        updateTargetSelect(state.data.targets || []);
        render();
      }

      function adminToken() {
        const token = storedToken();
        if (!token && state.adminEnabled) showLogin("");
        return token;
      }

      async function deleteNode(nodeWrap) {
        if (!requireAdmin()) return;
        const node = nodeWrap.node || {};
        const token = adminToken();
        if (!token && state.adminEnabled) return;
        if (!window.confirm(`Delete VPS node "${node.name || node.id}" from the center panel?`)) return;
        const response = await fetch("/api/nodes/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            admin_token: token,
            node_id: node.id,
          }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          if (response.status === 401) {
            setStoredToken("");
            showLogin("Admin token expired or invalid");
          }
          window.alert(data.error || "Delete failed");
          return;
        }
        await loadSnapshot();
      }

      async function deleteTarget(target) {
        if (!requireAdmin()) return;
        const token = adminToken();
        if (!token && state.adminEnabled) return;
        if (!window.confirm(`Delete target "${target.name}" from all assigned probes?`)) return;
        const response = await fetch("/api/targets/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            admin_token: token,
            target_id: target.id,
            sync: true,
          }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          if (response.status === 401) {
            setStoredToken("");
            showLogin("Admin token expired or invalid");
          }
          window.alert(data.error || "Delete failed");
          return;
        }
        await loadSnapshot();
      }

      function field(name, label, attrs = "") {
        return `
          <div class="field">
            <label for="${name}">${label}</label>
            <input id="${name}" name="${name}" ${attrs} />
          </div>
        `;
      }

      function openModal(mode, target = null) {
        state.modalMode = mode;
        state.editTarget = target;
        state.editNode = mode === "editNode" ? target : null;
        $("modalError").textContent = "";
        $("modal").classList.add("open");
        if (mode === "node") {
          $("modalTitle").textContent = "Add VPS";
          $("modalForm").innerHTML = [
            field("url", "Probe URL", 'placeholder="http://1.2.3.4:8099" required'),
            field("name", "Name", 'placeholder="Tokyo VPS" required'),
            field("location", "Location", 'placeholder="Tokyo / JP"'),
            field("nodeToken", "Remote Admin Token", 'placeholder="optional" type="password"'),
          ].join("");
          return;
        }
        if (mode === "editNode") {
          const node = target.node || {};
          $("modalTitle").textContent = "Edit VPS";
          $("modalForm").innerHTML = `
            ${field("editNodeName", "Name", 'required')}
            ${field("editNodeLocation", "Location", 'placeholder="Tokyo / JP"')}
          `;
          $("editNodeName").value = node.name || "";
          $("editNodeLocation").value = node.location || "";
          return;
        }
        if (mode === "assign") {
          $("modalTitle").textContent = "Assign Target";
          $("modalForm").innerHTML = `
            ${field("targetName", "Target", 'readonly')}
            ${nodeCheckboxes(assignedNodeIds(target.id))}
          `;
          $("targetName").value = target.name;
          return;
        }
        if (mode === "editTarget") {
          $("modalTitle").textContent = "Edit Target";
          $("modalForm").innerHTML = `
            ${field("editTargetName", "Name", 'required')}
            ${field("editTargetAddress", "Host / URL", 'readonly')}
            ${field("editTargetKind", "Kind", 'readonly')}
          `;
          $("editTargetName").value = target.name || "";
          $("editTargetAddress").value = target.url || target.host || "";
          $("editTargetKind").value = target.kind || "";
          return;
        }
        $("modalTitle").textContent = "Add Target";
        $("modalForm").innerHTML = `
          <div class="field">
            <label for="kind">Kind</label>
            <select id="kind" name="kind">
              <option value="icmp">ICMP</option>
              <option value="http">HTTP</option>
              <option value="tcp">TCP</option>
            </select>
          </div>
          ${field("name", "Name", 'placeholder="Origin Server" required')}
          ${field("host", "Host / URL", 'placeholder="example.com or https://example.com" required')}
          ${field("port", "TCP Port", 'placeholder="443"')}
          ${field("timeout", "Timeout Seconds", 'placeholder="3"')}
          ${nodeCheckboxes([])}
        `;
      }

      function closeModal() {
        $("modal").classList.remove("open");
        $("modalForm").innerHTML = "";
        $("modalError").textContent = "";
        state.editTarget = null;
        state.editNode = null;
      }

      function formValue(name) {
        const item = new FormData($("modalForm")).get(name);
        return typeof item === "string" ? item.trim() : "";
      }

      async function saveModal() {
        const token = adminToken();
        if (!token) return;
        let path = "";
        let body = { admin_token: token };
        if (state.modalMode === "node") {
          path = "/api/nodes";
          body.node = {
            url: formValue("url"),
            name: formValue("name"),
            location: formValue("location"),
            admin_token: formValue("nodeToken"),
          };
        } else if (state.modalMode === "editNode") {
          path = "/api/nodes/update";
          body.node_id = state.editNode?.node?.id;
          body.name = formValue("editNodeName");
          body.location = formValue("editNodeLocation");
        } else if (state.modalMode === "editTarget") {
          const name = formValue("editTargetName");
          if (!name) {
            $("modalError").textContent = "Target name is required";
            return;
          }
          const nodeIds = assignedNodeIds(state.editTarget.id);
          if (!nodeIds.length) {
            $("modalError").textContent = "Assign this target to at least one VPS first";
            return;
          }
          path = "/api/targets";
          body.target = { ...state.editTarget, name };
          body.node_ids = nodeIds;
          body.sync = true;
        } else if (state.modalMode === "assign") {
          const nodeIds = checkedNodeIds();
          if (!nodeIds.length) {
            $("modalError").textContent = "Select at least one VPS node";
            return;
          }
          path = "/api/targets";
          body.target = state.editTarget;
          body.node_ids = nodeIds;
          body.sync = true;
        } else {
          path = "/api/targets";
          const nodeIds = checkedNodeIds();
          if (!nodeIds.length) {
            $("modalError").textContent = "Select at least one VPS node";
            return;
          }
          const kind = formValue("kind");
          const host = formValue("host");
          body.target = {
            kind,
            name: formValue("name"),
            timeout_seconds: Number(formValue("timeout") || 3),
          };
          if (kind === "http") body.target.url = host;
          else {
            body.target.host = host;
            if (kind === "tcp") body.target.port = Number(formValue("port"));
          }
          body.node_ids = nodeIds;
          body.sync = true;
        }

        const response = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          if (response.status === 401) {
            setStoredToken("");
            showLogin("Admin token expired or invalid");
          }
          $("modalError").textContent = data.error || "Save failed";
          return;
        }
        closeModal();
        await loadSnapshot();
      }

      $("targetSelectButton").addEventListener("click", () => {
        const combo = $("targetCombo");
        const isOpen = combo.classList.toggle("open");
        $("targetSelectButton").setAttribute("aria-expanded", String(isOpen));
      });
      $("peakToggleBtn").addEventListener("click", () => {
        state.trimPeaks = !state.trimPeaks;
        updatePeakButton();
        drawChart();
      });
      document.addEventListener("click", (event) => {
        if (!$("targetCombo").contains(event.target)) {
          $("targetCombo").classList.remove("open");
          $("targetSelectButton").setAttribute("aria-expanded", "false");
        }
      });
      $("refreshBtn").addEventListener("click", loadSnapshot);
      $("addNodeBtn").addEventListener("click", () => {
        if (requireAdmin()) openModal("node");
      });
      $("addTargetBtn").addEventListener("click", () => {
        if (requireAdmin()) openModal("target");
      });
      $("loginBtn").addEventListener("click", login);
      $("loginToken").addEventListener("keydown", (event) => {
        if (event.key === "Enter") login();
      });
      $("logoutBtn").addEventListener("click", logout);
      $("cancelModal").addEventListener("click", closeModal);
      $("saveModal").addEventListener("click", saveModal);
      $("modal").addEventListener("click", (event) => {
        if (event.target.id === "modal") closeModal();
      });
      window.addEventListener("resize", drawChart);

      setClock();
      updatePeakButton();
      updateTimeRangeTabs();
      setInterval(setClock, 1000);
      initAuth();
      loadSnapshot();
      setInterval(() => loadSnapshot({ history: false }), 3000);
      setInterval(loadSnapshot, 300000);
    </script>
  </body>
</html>
